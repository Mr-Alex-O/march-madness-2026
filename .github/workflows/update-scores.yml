name: Update Scores

on:
  schedule:
    - cron: '*/20 * * * *'   # every 20 minutes
  workflow_dispatch:           # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch scores from ESPN
        run: |
          DMINUS2=$(date -u -d '2 days ago' +%Y%m%d)
          DMINUS1=$(date -u -d 'yesterday' +%Y%m%d)
          DATE=$(date -u +%Y%m%d)
          TOMORROW=$(date -u -d 'tomorrow' +%Y%m%d)
          DAY2=$(date -u -d '2 days' +%Y%m%d)

          curl -sf "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${DMINUS2}&limit=100" > dm2.json \
            || echo '{"events":[]}' > dm2.json

          curl -sf "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${DMINUS1}&limit=100" > dm1.json \
            || echo '{"events":[]}' > dm1.json

          curl -sf "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${DATE}&limit=100" > d0.json \
            || echo '{"events":[]}' > d0.json

          curl -sf "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${TOMORROW}&limit=100" > d1.json \
            || echo '{"events":[]}' > d1.json

          curl -sf "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${DAY2}&limit=100" > d2.json \
            || echo '{"events":[]}' > d2.json

          # Merge fresh events (new wins on dupe) into existing scores.json
          jq -s --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{ts: $ts, events: ([.[1].events//[], .[2].events//[], .[3].events//[], .[4].events//[], .[5].events//[], .[0].events//[]] | add // [] | unique_by(.id))}' \
            scores.json dm2.json dm1.json d0.json d1.json d2.json > scores_new.json && mv scores_new.json scores.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scores.json
          git diff --cached --quiet || (git commit -m "scores $(date -u +%H:%M)" && git push)
