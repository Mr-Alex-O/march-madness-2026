<html lang="en">

<style>
  /* ── Reset & Base ─────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d0d0d;
    color: #e8e8e8;
    min-height: 100vh;
  }

  /* ── Header ───────────────────────────────────────── */
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 14px 16px 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.6);
  }
  header h1 {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    text-align: center;
    letter-spacing: 0.5px;
  }
  header h1 span { color: #f9a825; }

  /* ── Score Banner ─────────────────────────────────── */
  .score-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 8px 16px 4px;
  }
  .score-player {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 80px;
  }
  .score-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .score-label.alex { color: #66bb6a; }
  .score-label.greg { color: #fdd835; }
  .score-num { font-size: 28px; font-weight: 800; line-height: 1; }
  .score-num.alex { color: #4caf50; }
  .score-num.greg { color: #fdd835; }
  .score-vs { font-size: 18px; color: #555; font-weight: 700; }
  .score-sub { font-size: 10px; color: #555; text-align: center; padding-bottom: 4px; }
  .score-breakdown { font-size: 11px; color: #444; text-align: center; padding: 2px 16px 4px; letter-spacing: 0.3px; }

  /* ── Update Button ────────────────────────────────── */
  .update-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 6px 16px 10px;
  }
  #updateBtn {
    background: #1565c0;
    color: #fff;
    border: none;
    padding: 8px 22px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  #updateBtn:hover { background: #1976d2; }
  #updateBtn:active { background: #0d47a1; }
  #updateBtn.loading { background: #333; cursor: not-allowed; }
  #lastUpdated { font-size: 11px; color: #555; }

  /* ── Legend ───────────────────────────────────────── */
  .legend {
    display: flex;
    justify-content: center;
    gap: 18px;
    padding: 0 16px 8px;
    font-size: 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 2px; }
  .legend-dot.alex { background: #2e7d32; }
  .legend-dot.greg { background: #827200; }

  /* ── Tabs ─────────────────────────────────────────── */
  .tab-bar {
    display: flex;
    overflow-x: auto;
    background: #111;
    border-bottom: 2px solid #222;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    color: #777;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.2s;
  }
  .tab-btn.active { color: #fff; border-bottom-color: #1976d2; }
  .tab-btn:hover { color: #ccc; }

  /* ── Tab Content ──────────────────────────────────── */
  .tab-pane { display: none; padding: 12px; }
  .tab-pane.active { display: block; }

  /* ── Region Bracket ───────────────────────────────── */
  .region-bracket {
    display: flex;
    flex-direction: row;
    gap: 0;
    overflow-x: auto;
    padding-bottom: 8px;
  }

  /* ── Round Column ─────────────────────────────────── */
  .round-col {
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    min-width: 150px;
  }
  .round-header {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
    text-align: center;
    padding: 4px 0 8px;
    font-weight: 600;
  }
  .round-slots {
    display: flex;
    flex-direction: column;
    flex: 1;
    justify-content: space-around;
  }

  /* ── Matchup ──────────────────────────────────────── */
  .matchup-wrapper {
    display: flex;
    align-items: center;
    position: relative;
  }
  .matchup {
    flex: 1;
    border: 1px solid #2a2a2a;
    border-radius: 5px;
    overflow: hidden;
    margin: 3px 0;
  }
  .team {
    display: flex;
    align-items: center;
    padding: 5px 7px;
    font-size: 12px;
    gap: 5px;
    min-height: 28px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .team:last-child { border-bottom: none; }
  .team.alex   { background: #1b5e20; }
  .team.greg   { background: #4a4000; }
  .team.neutral { background: #1e1e1e; }
  .team.winner { font-weight: 700; }
  .team.loser  { opacity: 0.35; }
  .team.tbp    { background: #181818; color: #666; }
  .team.live   { background: #1a2f1a; }
  .seed {
    font-size: 10px;
    color: #888;
    width: 14px;
    text-align: right;
    flex-shrink: 0;
  }
  .tname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tscore {
    font-size: 11px;
    color: #aaa;
    margin-left: auto;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tscore.live-score { color: #4caf50; }
  .tscore.win { color: #fff; }

  /* Connector lines between rounds */
  .connector {
    width: 12px;
    flex-shrink: 0;
    position: relative;
    align-self: stretch;
  }
  .connector::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 1px;
    background: #333;
  }

  /* ── Upset Tag ────────────────────────────────────── */
  .upset {
    font-size: 9px;
    background: #b71c1c;
    color: #fff;
    border-radius: 3px;
    padding: 1px 4px;
    margin-left: 2px;
    flex-shrink: 0;
  }

  /* ── First Four ───────────────────────────────────── */
  .first-four-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 500px) {
    .first-four-grid { grid-template-columns: 1fr; }
  }
  .ff-card {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    overflow: hidden;
  }
  .ff-label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 5px 8px;
    background: #0a0a0a;
    border-bottom: 1px solid #222;
  }
  .ff-note {
    font-size: 10px;
    color: #555;
    padding: 3px 8px 5px;
    font-style: italic;
  }

  /* ── Final Four / Championship ────────────────────── */
  .final-four-container {
    max-width: 500px;
    margin: 0 auto;
  }
  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
    padding: 12px 0 8px;
  }
  .champion-box {
    text-align: center;
    padding: 20px;
    background: linear-gradient(135deg, #1a2f1a, #2a2000);
    border: 1px solid #333;
    border-radius: 12px;
    margin: 8px 0;
  }
  .champion-box .trophy { font-size: 36px; display: block; margin-bottom: 8px; }
  .champion-box .champion-name { font-size: 20px; font-weight: 800; color: #fdd835; }
  .champion-box .champion-sub  { font-size: 12px; color: #888; margin-top: 4px; }

  /* ── Live Pulse ───────────────────────────────────── */
  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4caf50;
    margin-right: 5px;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* ── Scheduled time chip ──────────────────────────── */
  .sched-chip {
    font-size: 10px;
    color: #555;
    text-align: center;
    padding: 2px 0 1px;
    background: #0f0f0f;
    letter-spacing: 0.3px;
  }

  /* ── Responsive ───────────────────────────────────── */
  @media (max-width: 480px) {
    .round-col { min-width: 120px; }
    .team { font-size: 11px; padding: 4px 5px; }
    .tname { font-size: 11px; }
  }

// ══════════════════════════════════════════════════════
//  RENDER HELPERS
// ══════════════════════════════════════════════════════
function teamRowHTML(t, m, which) {
  const o = owner(t.name) || owner(t.espn) || 'neutral';
  let cls = o;
  let scoreHTML = '';

  if (t.name === 'TBD') {
    cls = 'tbp';
    scoreHTML = '';
  } else if (m.status === 'final') {
    const isWinner = m.winner === which;
    cls += isWinner ? ' winner' : ' loser';
    const s = which === 1 ? m.score1 : m.score2;
    scoreHTML = `<span class="tscore win">${s}${isWinner ? ' ✓' : ''}</span>`;
    if (isWinner && m.upset && which === 2) scoreHTML += `<span class="upset">UPSET</span>`;
    if (isWinner && m.upset && which === 1) scoreHTML += `<span class="upset">UPSET</span>`;
  } else if (m.status === 'live') {
    cls += ' live';
    const s = which === 1 ? m.score1 : m.score2;
    scoreHTML = `<span class="tscore live-score">${s}</span>`;
  } else if (m.status === 'sched') {
    cls = 'tbp';
    scoreHTML = '';
  } else {
    cls = 'tbp';
  }

  const seedHTML = t.seed ? `<span class="seed">${t.seed}</span>` : '';
  return `<div class="team ${cls}" id="t-${m.id}-${which}">${seedHTML}<span class="tname">${t.name}</span>${scoreHTML}</div>`;
}

function matchupHTML(m) {
  let statusBar = '';
  if (m.status === 'sched')  statusBar = `<div class="sched-chip">${m.sched || ''}</div>`;
  if (m.status === 'live')   statusBar = `<div class="sched-chip"><span class="live-dot"></span>${m.detail || 'In Progress'}</div>`;
  if (m.status === 'final' && m.detail) statusBar = `<div class="sched-chip">Final (${m.detail})</div>`;

  return `<div class="matchup" id="m-${m.id}">
    ${teamRowHTML(m.t1, m, 1)}
    ${teamRowHTML(m.t2, m, 2)}
    ${statusBar}
  </div>`;
}

// ══════════════════════════════════════════════════════
//  RENDER REGION BRACKET
// ══════════════════════════════════════════════════════
function renderRegion(regionKey) {
  const region = DATA.regions[regionKey];
  const container = document.getElementById('bracket-' + regionKey);
  container.innerHTML = '';

  region.rounds.forEach((round, ri) => {
    const col = document.createElement('div');
    col.className = 'round-col';

    col.innerHTML = `<div class="round-header">${round.label}</div>`;
    const slots = document.createElement('div');
    slots.className = 'round-slots';
    round.matchups.forEach(m => {
      const wrapper = document.createElement('div');
      wrapper.className = 'matchup-wrapper';
      wrapper.innerHTML = matchupHTML(m);
      slots.appendChild(wrapper);
    });
    col.appendChild(slots);
    container.appendChild(col);

    // Add connector between rounds (except last)
    if (ri < region.rounds.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'connector';
      container.appendChild(conn);
    }
  });
}

// ══════════════════════════════════════════════════════
//  SCORE CALCULATION  (money per milestone)
//  Sweet 16 win  → reaches Elite Eight  = $5
//  Elite Eight win → reaches Final Four = $10
//  Final Four win  → reaches Finals     = $15
//  Championship win → Champion          = $20
// ══════════════════════════════════════════════════════
const ROUND_MONEY = {
  'Sweet 16':     5,
  'Elite Eight':  10,
  'Final Four':   15,
  'Championship': 20,
};

function calcScores() {
  let alex = 0, greg = 0;

  function countMatchup(m, roundLabel) {
    if (m.status !== 'final' || !m.winner) return;
    const dollars = ROUND_MONEY[roundLabel] || 0;
    if (!dollars) return;
    const winner = m.winner === 1 ? m.t1 : m.t2;
    const o = owner(winner.name) || owner(winner.espn);
    if (o === ALEX) alex += dollars;
    else if (o === GREG) greg += dollars;
  }

  Object.values(DATA.regions).forEach(r =>
    r.rounds.forEach(rd => rd.matchups.forEach(m => countMatchup(m, rd.label)))
  );
  DATA.finalFour.forEach(m => countMatchup(m, 'Final Four'));
  countMatchup(DATA.championship, 'Championship');

  document.getElementById('alexScore').textContent = '$' + alex;
  document.getElementById('gregScore').textContent = '$' + greg;

  // Difference line
  const diff = Math.abs(alex - greg);
  let diffText = '';
  if (alex === 0 && greg === 0) {
    diffText = 'Elite Eight & beyond earns money';
  } else if (alex === greg) {
    diffText = "It's tied — no money owed";
  } else if (alex > greg) {
    diffText = `Greg owes Alex $${diff}`;
  } else {
    diffText = `Alex owes Greg $${diff}`;
  }
  document.getElementById('alexBreakdown').innerHTML = '';
  document.getElementById('gregBreakdown').innerHTML =
    `<span style="color:#aaa;font-size:12px;">${diffText}</span>`;
}

// ══════════════════════════════════════════════════════
//  LIVE UPDATE via ESPN API
// ══════════════════════════════════════════════════════
function normName(n) {
  return n.toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
}
function nameMatch(a, b) {
  const na = normName(a), nb = normName(b);
  return na === nb || na.includes(nb) || nb.includes(na);
}

async function updateScores() {
  const btn = document.getElementById('updateBtn');
  btn.textContent = '⏳ Fetching...';
  btn.disabled = true;
  btn.className = 'btn-update loading';

  try {
    // Tournament spans multiple dates
    const dates = [
      '20260317','20260318','20260319',
      '20260320','20260321','20260322','20260323',
      '20260327','20260328','20260329','20260330',
      '20260403','20260404','20260406'
    ];
    const allGames = [];
    for (const date of dates) {
      try {
        const url = `https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=${date}&limit=100`;
        const res = await fetch(url);
        const json = await res.json();
        if (json.events) allGames.push(...json.events);
      } catch(_) {}
    }

    if (!allGames.length) {
      alert('Could not retrieve game data. Check your internet connection.');
      return;
    }

    // Build lookup: [ { t1name, t2name, score1, score2, winner, status, detail } ]
    const games = allGames.map(ev => {
      const comp = ev.competitions?.[0];
      if (!comp) return null;
      const comps = comp.competitors || [];
      if (comps.length < 2) return null;
      const home = comps.find(c=>c.homeAway==='home') || comps[0];
      const away = comps.find(c=>c.homeAway==='away') || comps[1];
      const statusType = comp.status?.type?.name || '';
      const statusDetail = comp.status?.type?.description || '';
      const isFinal = statusType === 'STATUS_FINAL';
      const isLive  = statusType === 'STATUS_IN_PROGRESS';
      return {
        name1: away.team?.displayName || '',
        name2: home.team?.displayName || '',
        score1: parseInt(away.score || 0),
        score2: parseInt(home.score || 0),
        winner1: away.winner || false,
        winner2: home.winner || false,
        isFinal, isLive, statusDetail,
      };
    }).filter(Boolean);

    // All matchups to update
    const allMatchups = [
      ...DATA.firstFour,
      ...Object.values(DATA.regions).flatMap(r => r.rounds.flatMap(rd => rd.matchups)),
      ...DATA.finalFour,
      DATA.championship,
    ];

    let updated = 0;
    for (const m of allMatchups) {
      if (m.t1.name === 'TBD' || !m.t1.espn) continue;
      const g = games.find(g =>
        (nameMatch(g.name1, m.t1.espn) && nameMatch(g.name2, m.t2.espn)) ||
        (nameMatch(g.name1, m.t2.espn) && nameMatch(g.name2, m.t1.espn))
      );
      if (!g) continue;
      updated++;

      // Figure out which competitor is t1 and which is t2
      const t1IsName1 = nameMatch(g.name1, m.t1.espn);
      const s1 = t1IsName1 ? g.score1 : g.score2;
      const s2 = t1IsName1 ? g.score2 : g.score1;
      const t1Wins = t1IsName1 ? g.winner1 : g.winner2;

      if (g.isFinal) {
        m.status = 'final';
        m.score1 = s1; m.score2 = s2;
        m.winner = t1Wins ? 1 : 2;
      } else if (g.isLive) {
        m.status = 'live';
        m.score1 = s1; m.score2 = s2;
        m.detail = g.statusDetail;
      }
    }

    // Also check for champion
    if (DATA.championship.status === 'final' && DATA.championship.winner) {
      const cw = DATA.championship.winner === 1 ? DATA.championship.t1 : DATA.championship.t2;
      DATA.champion = cw.name;
    }

    // Re-render everything
    renderAll();

    const now = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('lastUpdated').textContent = `Updated ${now}`;

  } catch(err) {
    alert('Error: ' + err.message);
  } finally {
    btn.textContent = '🔄 Live Update Scores';
    btn.disabled = false;
    btn.className = '';
  }
}

  renderFirstFour();
  ['east','west','south','midwest'].forEach(renderRegion);
  renderFinalFour();
  calcScores();
}
