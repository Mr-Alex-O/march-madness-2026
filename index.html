<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
<title>March Madness 2026 — Alex vs Greg</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MM 2026">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  /* ── Reset & Base ─────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: #e8e8e8;
    min-height: 100vh;
    /* Hardwood basketball floor */
    background: #000;
  }

  /* ── Header ───────────────────────────────────────── */
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding: 14px 16px 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.6);
  }
  header h1 {
    font-size: clamp(18px, 6.5vw, 30px);
    font-weight: 900;
    color: #fff;
    text-align: center;
    letter-spacing: 1px;
    white-space: nowrap;
    width: 100%;
    display: block;
    overflow: hidden;
  }
  header h1 span { color: #f9a825; }

  /* ── Score Banner ─────────────────────────────────── */
  .score-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 8px 16px 4px;
  }
  .score-player {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 80px;
  }
  .score-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .score-label.alex { color: #66bb6a; }
  .score-label.greg { color: #fdd835; }
  .score-num { font-size: 28px; font-weight: 800; line-height: 1; }
  .score-num.alex { color: #4caf50; }
  .score-num.greg { color: #fdd835; }
  .score-vs { font-size: 18px; color: #555; font-weight: 700; }
  .score-sub { font-size: 10px; color: #555; text-align: center; padding-bottom: 4px; }
  .score-breakdown { font-size: 11px; color: #444; text-align: center; padding: 2px 16px 4px; letter-spacing: 0.3px; }

  /* ── Update Button ────────────────────────────────── */
  .update-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 6px 16px 10px;
  }
  #updateBtn {
    background: #1565c0;
    color: #fff;
    border: none;
    padding: 8px 22px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  #updateBtn:hover { background: #1976d2; }
  #updateBtn:active { background: #0d47a1; }
  #updateBtn.loading { background: #333; cursor: not-allowed; }
  #lastUpdated { font-size: 11px; color: #555; }

  /* ── Legend ───────────────────────────────────────── */
  .legend {
    display: flex;
    justify-content: center;
    gap: 18px;
    padding: 0 16px 8px;
    font-size: 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 2px; }
  .legend-dot.alex { background: #2e7d32; }
  .legend-dot.greg { background: #827200; }

  /* ── Tabs ─────────────────────────────────────────── */
  .tab-bar {
    display: flex;
    overflow-x: auto;
    background: #111;
    border-bottom: 2px solid #222;
    scrollbar-width: none;
    position: sticky;
    top: 0;
    z-index: 99;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    color: #777;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.2s;
  }
  .tab-btn.active { color: #fff; border-bottom-color: #1976d2; }
  .tab-btn:hover { color: #ccc; }

  /* ── Tab Content ──────────────────────────────────── */
  .tab-pane { display: none; padding: 12px; }
  .tab-pane.active { display: block; }

  /* ── Bracket layout variables ─────────────────────── */
  :root {
    --mh: 66px;          /* fixed height per matchup (extra for upset banner) */
    --pair-gap: 10px;    /* gap between the two games in a R64 pair */
    --slots-h: 600px;    /* all round columns the same height
                            560 > 4*(2*60+10)=520 so space-around has room */
    --col-w: 148px;
  }

  /* ── Region Bracket ───────────────────────────────── */
  .region-bracket {
    display: flex;
    flex-direction: row;
    overflow-x: auto;
    padding-bottom: 8px;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Round Column ─────────────────────────────────── */
  .round-col {
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    width: var(--col-w);
  }
  .round-header {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
    text-align: center;
    padding: 4px 0 8px;
    font-weight: 600;
    white-space: nowrap;
  }
  /* All round-slots columns share the same fixed height —
     space-around then centers each matchup at the correct
     vertical position to align with its bracket neighbors */
  .round-slots {
    display: flex;
    flex-direction: column;
    height: var(--slots-h);
    justify-content: space-around;
  }

  /* ── Matchup ──────────────────────────────────────── */
  /* Wraps two R64 games that feed into the same R32 game */
  .matchup-pair {
    display: flex;
    flex-direction: column;
    gap: var(--pair-gap);
  }
  .matchup-wrapper {
    display: flex;
    align-items: center;
  }
  .matchup {
    flex: 1;
    border: 1px solid #2a2a2a;
    border-radius: 5px;
    overflow: hidden;
    height: var(--mh);
    display: flex;
    flex-direction: column;
  }
  .team {
    display: flex;
    align-items: center;
    padding: 3px 6px;
    font-size: 11px;
    gap: 4px;
    flex: 1;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    min-width: 0;
  }
  .team:last-child { border-bottom: none; }
  .team.alex    { background: #1b5e20; }
  .team.greg    { background: #4a4000; }
  .team.neutral { background: #1e1e1e; }
  .team.winner  { font-weight: 700; }
  .team.loser   { opacity: 0.35; }
  .team.tbp     { background: #181818; color: #555; }
  .team.live    { background: #1a2f1a; }
  .team.dimmed  { opacity: 0.45; }  /* scheduled — color visible but muted */
  .seed {
    font-size: 10px;
    color: #777;
    width: 13px;
    text-align: right;
    flex-shrink: 0;
  }
  .tname {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 11px;
  }
  .tscore {
    font-size: 10px;
    color: #aaa;
    margin-left: 2px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tscore.live-score { color: #fff; }
  .tscore.win { color: #fff; }

  /* Connector lines between rounds */
  .connector {
    width: 10px;
    flex-shrink: 0;
    position: relative;
    align-self: stretch;
  }
  .connector::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 1px;
    background: #2a2a2a;
  }

  /* ── Upset Banner ─────────────────────────────────── */
  .upset-banner {
    background: #b71c1c;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 6px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.2px;
  }

  /* ── First Four ───────────────────────────────────── */
  .first-four-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 500px) {
    .first-four-grid { grid-template-columns: 1fr; }
  }
  .ff-card {
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    overflow: hidden;
  }
  .ff-label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 5px 8px;
    background: #0a0a0a;
    border-bottom: 1px solid #222;
  }
  .ff-note {
    font-size: 10px;
    color: #555;
    padding: 3px 8px 5px;
    font-style: italic;
  }

  /* ── Final Four / Championship ────────────────────── */
  .final-four-container {
    max-width: 500px;
    margin: 0 auto;
  }
  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
    padding: 12px 0 8px;
  }
  .champion-box {
    text-align: center;
    padding: 20px;
    background: linear-gradient(135deg, #1a2f1a, #2a2000);
    border: 1px solid #333;
    border-radius: 12px;
    margin: 8px 0;
  }
  .champion-box .trophy { font-size: 36px; display: block; margin-bottom: 8px; }
  .champion-box .champion-name { font-size: 20px; font-weight: 800; color: #fdd835; }
  .champion-box .champion-sub  { font-size: 12px; color: #888; margin-top: 4px; }

  /* ── Live Pulse ───────────────────────────────────── */
  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4caf50;
    margin-right: 5px;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* ── Scheduled time chip ──────────────────────────── */
  .sched-chip {
    font-size: 10px;
    color: #555;
    text-align: center;
    padding: 2px 0 1px;
    background: #0f0f0f;
    letter-spacing: 0.3px;
  }

  /* ── Live Games Tab ───────────────────────────────── */
  .live-empty {
    text-align: center;
    color: #555;
    padding: 40px 20px;
    font-size: 14px;
  }
  .live-card {
    background: #111827;
    border: 1px solid #1e2a3a;
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .live-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    background: #0d1520;
    font-size: 11px;
    color: #aaa;
  }
  .live-card-header .live-dot { margin-right: 4px; }
  .live-team-row {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    gap: 10px;
    border-bottom: 1px solid #1a2535;
    font-size: 14px;
    font-weight: 600;
  }
  .live-team-row:last-of-type { border-bottom: none; }
  .live-team-row.alex { background: #1b5e20; }
  .live-team-row.greg { background: #4a4000; }
  .live-team-row.neutral-live { background: #161f2e; }
  .live-seed-badge {
    font-size: 11px;
    color: #aaa;
    width: 16px;
    text-align: right;
    flex-shrink: 0;
  }
  .live-team-name { flex: 1; }
  .live-score {
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    min-width: 32px;
    text-align: right;
  }
  .live-score.leading { color: #4caf50; }

  /* ── Full Bracket ─────────────────────────────────── */
  .full-bracket-wrap { padding: 10px 12px 30px; }
  .filter-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 0 12px;
  }
  .filter-btn {
    padding: 6px 18px;
    border-radius: 16px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: #888;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn.active-all  { background: #1976d2; color: #fff; border-color: #1976d2; }
  .filter-btn.active-alex { background: #2e7d32; color: #fff; border-color: #2e7d32; }
  .filter-btn.active-greg { background: #827200; color: #fff; border-color: #f9a825; }

  /* Dim effect when filtering */
  .dim-alex .team.alex { opacity: 0.12; }
  .dim-greg .team.greg { opacity: 0.12; }

  .full-regions-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }
  @media (min-width: 900px) {
    .full-regions-grid { grid-template-columns: 1fr 1fr; }
  }
  .full-region-block { }
  .full-region-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
    text-align: center;
    padding: 6px 0 8px;
    border-bottom: 1px solid #222;
    margin-bottom: 8px;
  }

  /* ── Responsive ───────────────────────────────────── */
  @media (max-width: 480px) {
    /* Shrink columns so all 4 rounds fit on screen without scrolling */
    :root {
      --mh: 54px;
      --pair-gap: 6px;
      --slots-h: 490px;
      --col-w: 82px;    /* 4 cols × 82px + 3 connectors × 8px = 352px — fits ~360px+ screens */
    }
    .team { font-size: 10px; padding: 2px 4px; gap: 3px; }
    .tname { font-size: 10px; }
    .seed { font-size: 9px; width: 11px; }
    .tscore { font-size: 9px; }
    .round-header { font-size: 9px; letter-spacing: 0.5px; }
    .connector { width: 8px; }
    .tab-btn { padding: 9px 10px; font-size: 12px; }
    .full-bracket-wrap { padding: 8px 6px 20px; }
    .region-bracket { padding-bottom: 4px; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     HEADER
════════════════════════════════════════════════════ -->
<header>
  <h1>🏀 March Madness <span>2026</span></h1>
  <div class="score-bar">
    <div class="score-player">
      <span class="score-label alex">Alex</span>
      <span class="score-num alex" id="alexScore">$0</span>
      <span class="teams-left" id="alexTeamsLeft" style="font-size:11px;color:#4caf50;margin-top:2px;">32 teams left</span>
    </div>
    <span class="score-vs">vs</span>
    <div class="score-player">
      <span class="score-label greg">Greg</span>
      <span class="score-num greg" id="gregScore">$0</span>
      <span class="teams-left" id="gregTeamsLeft" style="font-size:11px;color:#fdd835;margin-top:2px;">32 teams left</span>
    </div>
  </div>
  <div class="score-sub" id="scoreNote">E8: $5 · Final Four: $10 · Finals: $15 · Champion: $20</div>
  <div class="score-breakdown" id="alexBreakdown"></div>
  <div class="score-breakdown" id="gregBreakdown"></div>
  <div class="update-bar">
    <button id="updateBtn" onclick="updateScores()">🔄 Live Update Scores</button>
    <span id="lastUpdated"></span>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot alex"></div> Alex's Teams</div>
    <div class="legend-item"><div class="legend-dot greg"></div> Greg's Teams</div>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════
     TABS
════════════════════════════════════════════════════ -->
<div class="tab-bar" id="tabBar">
  <button class="tab-btn active" onclick="showTab('full')">📋 Full Bracket</button>
  <button class="tab-btn" onclick="showTab('east')">East</button>
  <button class="tab-btn" onclick="showTab('west')">West</button>
  <button class="tab-btn" onclick="showTab('south')">South</button>
  <button class="tab-btn" onclick="showTab('midwest')">Midwest</button>
  <button class="tab-btn" onclick="showTab('finale')">🏆 Final Four</button>
</div>

<!-- ═══════════════════════════════════════════════════
     TAB: FULL BRACKET
════════════════════════════════════════════════════ -->
<div class="tab-pane active" id="tab-full">
  <div class="full-bracket-wrap">
    <div class="filter-bar">
      <button class="filter-btn active-all" id="fb-all"  onclick="setFilter('all')">All Teams</button>
      <button class="filter-btn"            id="fb-alex" onclick="setFilter('alex')">🟢 Alex Only</button>
      <button class="filter-btn"            id="fb-greg" onclick="setFilter('greg')">🟡 Greg Only</button>
    </div>
    <div class="full-regions-grid" id="full-regions-grid"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     REGION TABS
════════════════════════════════════════════════════ -->
<div class="tab-pane" id="tab-east" style="padding:12px;">
  <div class="region-bracket" id="bracket-east"></div>
</div>
<div class="tab-pane" id="tab-west">
  <div class="region-bracket" id="bracket-west"></div>
</div>
<div class="tab-pane" id="tab-south">
  <div class="region-bracket" id="bracket-south"></div>
</div>
<div class="tab-pane" id="tab-midwest">
  <div class="region-bracket" id="bracket-midwest"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     TAB: FINAL FOUR / CHAMPIONSHIP
════════════════════════════════════════════════════ -->
<div class="tab-pane" id="tab-finale">
  <div class="final-four-container">
    <div class="section-title">Final Four</div>
    <div id="finalFourMatchups"></div>
    <div class="section-title" style="padding-top:20px;">Championship</div>
    <div id="championshipMatchup"></div>
    <div id="championDisplay"></div>
  </div>
</div>


<div style="text-align:center; padding: 24px 0 12px; font-size: 11px; color: #333; letter-spacing: 1px;">

<script>

}

    {

//  RENDER HELPERS
// ══════════════════════════════════════════════════════
function teamRowHTML(t, m, which) {
  const o = t.owner || owner(t.name) || owner(t.espn) || 'neutral';
  let cls = '';
  let scoreHTML = '';

  if (t.name === 'TBD') {
    cls = 'tbp';
  } else if (m.status === 'live') {
    // LIVE: full team color + score (bright)
    cls = o + ' live';
    const s = which === 1 ? m.score1 : m.score2;
    scoreHTML = `<span class="tscore live-score">${s}</span>`;
  } else if (m.status === 'final') {
    // Completed: show team color but dimmed for loser
    const isWinner = m.winner === which;
    cls = o + (isWinner ? ' winner' : ' loser');
    const s = which === 1 ? m.score1 : m.score2;
    if (s !== null) scoreHTML = `<span class="tscore win">${s}${isWinner ? ' ✓' : ''}</span>`;
  } else {
    // Scheduled — show team color but dimmed (not active yet)
    cls = o + ' dimmed';
  }

  const seedHTML = t.seed ? `<span class="seed">${t.seed}</span>` : '';
  return `<div class="team ${cls}" id="t-${m.id}-${which}">${seedHTML}<span class="tname">${t.name}</span>${scoreHTML}</div>`;
}

function matchupHTML(m) {
  let statusBar = '';
  if (m.status === 'sched')  statusBar = `<div class="sched-chip">${m.sched || ''}</div>`;
  if (m.status === 'live') {
    const timeInfo = [m.detail || 'In Progress', m.clock].filter(Boolean).join(' · ');
    statusBar = `<div class="sched-chip"><span class="live-dot"></span>${timeInfo}</div>`;
  }
  if (m.status === 'final' && m.detail && !m.upset) statusBar = `<div class="sched-chip">Final (${m.detail})</div>`;

  let upsetBanner = '';
  if (m.status === 'final' && m.upset) {
    const extra = m.detail ? ` (${m.detail})` : '';
    upsetBanner = `<div class="upset-banner">🔥 UPSET${extra}</div>`;
  }

  return `<div class="matchup" id="m-${m.id}">
    ${teamRowHTML(m.t1, m, 1)}
    ${teamRowHTML(m.t2, m, 2)}
    ${statusBar}${upsetBanner}
  </div>`;
}

function renderLiveTab() {
  const container = document.getElementById('live-games-container');
  const allMatchups = [
    ...Object.values(DATA.regions).flatMap(r => r.rounds.flatMap(rd => rd.matchups)),
    ...DATA.finalFour,
    DATA.championship,

  const liveGames = allMatchups.filter(m => m.status === 'live');

  if (liveGames.length === 0) {
    container.innerHTML = `<div class="live-empty">
      <div style="font-size:36px;margin-bottom:12px;">🏀</div>
      <div>No games in progress right now.</div>
      <div style="margin-top:6px;color:#444;font-size:12px;">Scores auto-refresh every 60 seconds.</div>
    </div>`;
    return;
  }

  container.innerHTML = liveGames.map(m => {
    const o1 = owner(m.t1.name) || owner(m.t1.espn) || 'neutral-live';
    const o2 = owner(m.t2.name) || owner(m.t2.espn) || 'neutral-live';
    const s1 = m.score1 ?? 0, s2 = m.score2 ?? 0;
    const t1Leading = s1 >= s2;
    const timeInfo = [m.detail, m.clock].filter(Boolean).join(' · ') || 'In Progress';
    return `
      <div class="live-card">
        <div class="live-card-header">
          <span><span class="live-dot"></span>LIVE · ${timeInfo}</span>
        </div>
        <div class="live-team-row ${o1}">
          <span class="live-seed-badge">${m.t1.seed || ''}</span>
          <span class="live-team-name">${m.t1.name}</span>
          <span class="live-score ${t1Leading ? 'leading' : ''}">${s1}</span>
        </div>
        <div class="live-team-row ${o2}">
          <span class="live-seed-badge">${m.t2.seed || ''}</span>
          <span class="live-team-name">${m.t2.name}</span>
          <span class="live-score ${!t1Leading ? 'leading' : ''}">${s2}</span>
        </div>
      </div>`;
  }).join('');
}

let currentFilter = 'all';

function setFilter(f) {
  currentFilter = f;
  const grid = document.getElementById('full-regions-grid');
  grid.classList.remove('dim-alex', 'dim-greg');
  if (f === 'alex') grid.classList.add('dim-greg');
  if (f === 'greg') grid.classList.add('dim-alex');

  ['all','alex','greg'].forEach(k => {
    const btn = document.getElementById('fb-' + k);
    btn.className = 'filter-btn' + (k === f ? ' active-' + f : '');
  });
  // Fix "all" button class
  if (f === 'all') document.getElementById('fb-all').className = 'filter-btn active-all';
}

const REVERSED_REGIONS = new Set(['west', 'midwest']);

function buildRegionBracketEl(regionKey) {
  const region = DATA.regions[regionKey];
  const reversed = REVERSED_REGIONS.has(regionKey);
  const rounds = reversed ? [...region.rounds].reverse() : region.rounds;

  const bracketRow = document.createElement('div');
  bracketRow.className = 'region-bracket';

  rounds.forEach((round, ri) => {
    const col = document.createElement('div');
    col.className = 'round-col';
    col.innerHTML = `<div class="round-header">${round.label}</div>`;
    const slots = document.createElement('div');
    slots.className = 'round-slots';

    if (round.label === 'Round of 64') {
      // Group every two games into a .matchup-pair so it's obvious
      // which teams play each other, and centers stay aligned with R32
      for (let i = 0; i < round.matchups.length; i += 2) {
        const pair = document.createElement('div');
        pair.className = 'matchup-pair';
        [round.matchups[i], round.matchups[i + 1]].forEach(m => {
          if (!m) return;
          const w = document.createElement('div');
          w.className = 'matchup-wrapper';
          w.innerHTML = matchupHTML(m);
          pair.appendChild(w);
        });
        slots.appendChild(pair);
      }
    } else {
      round.matchups.forEach(m => {
        const wrapper = document.createElement('div');
        wrapper.className = 'matchup-wrapper';
        wrapper.innerHTML = matchupHTML(m);
        slots.appendChild(wrapper);
      });
    }

    col.appendChild(slots);
    bracketRow.appendChild(col);
    if (ri < rounds.length - 1) {
      const conn = document.createElement('div');
      conn.className = 'connector';
      bracketRow.appendChild(conn);
    }
  });
  return bracketRow;
}

function renderFullBracket() {
  const grid = document.getElementById('full-regions-grid');
  grid.innerHTML = '';
  ['east','west','south','midwest'].forEach(regionKey => {
    const region = DATA.regions[regionKey];
    const block = document.createElement('div');
    block.className = 'full-region-block';
    block.innerHTML = `<div class="full-region-title">${region.name}</div>`;
    block.appendChild(buildRegionBracketEl(regionKey));
    grid.appendChild(block);
  });
  setFilter(currentFilter);
}

// ══════════════════════════════════════════════════════
//  SCORE CALCULATION  (money per milestone)
//  Sweet 16 win  → reaches Elite Eight  = $5
//  Elite Eight win → reaches Final Four = $10
//  Final Four win  → reaches Finals     = $15
//  Championship win → Champion          = $20
// ══════════════════════════════════════════════════════
const ROUND_MONEY = {
  'Sweet 16':     5,
  'Elite Eight':  10,
  'Final Four':   15,
  'Championship': 20,
};

function calcScores() {
  let alex = 0, greg = 0;

  function countMatchup(m, roundLabel) {
    if (m.status !== 'final' || !m.winner) return;
    const dollars = ROUND_MONEY[roundLabel] || 0;
    if (!dollars) return;
    const winner = m.winner === 1 ? m.t1 : m.t2;
    const o = winner.owner || owner(winner.name) || owner(winner.espn);
    if (o === ALEX) alex += dollars;
    else if (o === GREG) greg += dollars;
  }

  Object.values(DATA.regions).forEach(r =>
    r.rounds.forEach(rd => rd.matchups.forEach(m => countMatchup(m, rd.label)))
  );
  DATA.finalFour.forEach(m => countMatchup(m, 'Final Four'));
  countMatchup(DATA.championship, 'Championship');

  document.getElementById('alexScore').textContent = '$' + alex;
  document.getElementById('gregScore').textContent = '$' + greg;

  // Count teams still alive (not yet eliminated)
  let alexAlive = 0, gregAlive = 0;
  const allMatchupTeams = [
    ...Object.values(DATA.regions).flatMap(r => r.rounds.flatMap(rd => rd.matchups)),
    ...DATA.finalFour,
    DATA.championship,
  ];
  // A team is alive if it hasn't lost a completed game
  const eliminated = new Set();
  allMatchupTeams.forEach(m => {
    if (m.status !== 'final' || !m.winner) return;
    const loser = m.winner === 1 ? m.t2 : m.t1;
    if (loser.name && loser.name !== 'TBD') eliminated.add(loser.name.toLowerCase());
  });
  // Count each player's teams not in eliminated set
  Object.keys(OWNER_MAP).forEach(k => {
    if (eliminated.has(k)) return;
    if (OWNER_MAP[k] === ALEX) alexAlive++;
    else if (OWNER_MAP[k] === GREG) gregAlive++;
  });
  // Deduplicate (OWNER_MAP has multiple keys per team) — count unique team names
  const countAlive = (playerConst) => {
    const seen = new Set();
    Object.entries(OWNER_MAP).forEach(([k, v]) => {
      if (v !== playerConst) return;
      const canonical = k; // use as-is, but avoid double-counting aliases
      seen.add(canonical);
    });
    // Filter to only canonical (first) entries per team — use a simple heuristic
    // Just count from the original 32-team lists
    return [...seen].filter(k => !eliminated.has(k)).length;
  };
  // Simpler: count from DATA directly — alive teams are those who haven't lost
  let alexLeft = 0, gregLeft = 0;
  Object.values(DATA.regions).forEach(r => r.rounds[0].matchups.forEach(m => {
    [m.t1, m.t2].forEach(t => {
      if (!t.name || t.name === 'TBD') return;
      if (eliminated.has(t.name.toLowerCase())) return;
      const o = t.owner || owner(t.name);
      if (o === ALEX) alexLeft++;
      else if (o === GREG) gregLeft++;
    });
  }));
  document.getElementById('alexTeamsLeft').textContent = alexLeft + ' team' + (alexLeft !== 1 ? 's' : '') + ' left';
  document.getElementById('gregTeamsLeft').textContent = gregLeft + ' team' + (gregLeft !== 1 ? 's' : '') + ' left';

  // Difference line
  const diff = Math.abs(alex - greg);
  let diffText = '';
  if (alex === 0 && greg === 0) {
    diffText = 'Elite Eight & beyond earns money';
  } else if (alex === greg) {
    diffText = "It's tied — no money owed";
  } else if (alex > greg) {
    diffText = `Greg owes Alex $${diff}`;
  } else {
    diffText = `Alex owes Greg $${diff}`;
  }
  document.getElementById('alexBreakdown').innerHTML = '';
  document.getElementById('gregBreakdown').innerHTML =
    `<span style="color:#aaa;font-size:12px;">${diffText}</span>`;
}

// ══════════════════════════════════════════════════════
//  LIVE UPDATE via ESPN API
// ══════════════════════════════════════════════════════
const ESPN_ALIASES = {
  'uconn': 'connecticut',
  'saint johns ny': 'st johns ny',
  'saint johns': 'st johns ny',
  'st johns': 'st johns ny',
  'cal baptist': 'california baptist',
  'ca baptist': 'california baptist',
  'central florida': 'ucf',
  'prairie view am': 'prairie view',
  'queens university': 'queens',
  'miami oh': 'miami ohio',
  'miami ohio': 'miami ohio',
  'long island': 'long island university',
  'wright st': 'wright state',
  'michigan st': 'michigan state',
  'tennessee st': 'tennessee state',
  'north dakota st': 'north dakota state',
};
function normName(n) {
  const base = n.toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
  return ESPN_ALIASES[base] || base;
}
function nameMatch(a, b) {
  const na = normName(a), nb = normName(b);
  if (na === nb) return true;
  // Only allow substring match when one name is very short (abbreviation like "UCF")
  // This prevents "Arizona" matching "Arizona State", "Texas" matching "Texas Tech", etc.
  const shorter = na.length <= nb.length ? na : nb;
  const longer  = na.length <= nb.length ? nb : na;
  return shorter.length <= 3 && longer.includes(shorter);
}

async function updateScores() {
  const btn = document.getElementById('updateBtn');
  btn.textContent = '⏳ Fetching...';
  btn.disabled = true;
  btn.className = 'btn-update loading';

  try {
    // processGames: apply a raw ESPN events array to DATA and re-render
    function processGames(events) {
      const games = events.map(ev => {
        const comp = ev.competitions?.[0];
        if (!comp) return null;
        const comps = comp.competitors || [];
        if (comps.length < 2) return null;
        const home = comps.find(c=>c.homeAway==='home') || comps[0];
        const away = comps.find(c=>c.homeAway==='away') || comps[1];
        const statusType   = comp.status?.type?.name || '';
        const statusDetail = comp.status?.type?.description || '';
        const isFinal   = statusType === 'STATUS_FINAL';
        const isLive    = statusType === 'STATUS_IN_PROGRESS';
        const isHalf    = statusType === 'STATUS_HALFTIME';
        const isTimeout = statusDetail?.toLowerCase().includes('timeout') ||
                          statusType === 'STATUS_DELAY';
        return {
          name1: away.team?.shortDisplayName || away.team?.displayName || '',
          name2: home.team?.shortDisplayName || home.team?.displayName || '',
          score1: parseInt(away.score || 0),
          score2: parseInt(home.score || 0),
          winner1: away.winner || false,
          winner2: home.winner || false,
          isFinal, isLive: isLive || isHalf, isTimeout, statusDetail,
          clock: comp.status?.displayClock || '',
          period: comp.status?.period || '',
          date: ev.date || '',
          broadcast: comp.broadcasts?.[0]?.names?.[0] || '',
        };
      }).filter(Boolean);

      const allMatchups = [
        ...DATA.firstFour,
        ...Object.values(DATA.regions).flatMap(r => r.rounds.flatMap(rd => rd.matchups)),
        ...DATA.finalFour,
        DATA.championship,
      ];

      function applyGames() {
        for (const m of allMatchups) {
          if (m.t1.name === 'TBD' || !m.t1.espn) continue;
          const g = games.find(g =>
            (nameMatch(g.name1, m.t1.espn) && nameMatch(g.name2, m.t2.espn)) ||
            (nameMatch(g.name1, m.t2.espn) && nameMatch(g.name2, m.t1.espn))
          );
          if (!g) continue;
          const t1IsName1 = nameMatch(g.name1, m.t1.espn);
          const s1 = t1IsName1 ? g.score1 : g.score2;
          const s2 = t1IsName1 ? g.score2 : g.score1;
          const t1Wins = t1IsName1 ? g.winner1 : g.winner2;
          if (g.isFinal) {
            m.status = 'final';
            m.score1 = s1; m.score2 = s2;
            m.winner = s1 > s2 ? 1 : 2;
            m.detail = '';
          } else if (g.isLive) {
            m.status = 'live';
            m.score1 = s1; m.score2 = s2;
            m.detail = g.isTimeout ? 'Timeout' : g.statusDetail;
            m.clock  = g.isTimeout ? '' : g.clock;
            m.period = g.period;
          } else if (g.date) {
            const d = new Date(g.date);
            const dateStr = d.toLocaleDateString('en-US', {month:'short', day:'numeric', timeZone:'America/New_York'});
            const timeStr = d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', timeZone:'America/New_York', hour12:true});
            m.sched = dateStr + ' · ' + timeStr + (g.broadcast ? ' ' + g.broadcast : '');
            if (m.status === 'tbd') m.status = 'sched';
          }
        }
      }

      // Pass 1: resolve R64 games
      applyGames();
      // Advance R64 winners into R32 slots so pass 2 can find them
      advanceWinners();
      // Pass 2: match newly populated R32+ slots against ESPN schedule data
      applyGames();

      if (DATA.championship.status === 'final' && DATA.championship.winner) {
        const cw = DATA.championship.winner === 1 ? DATA.championship.t1 : DATA.championship.t2;
        DATA.champion = {...cw};
      }

      renderAll();
      const now = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
      document.getElementById('lastUpdated').textContent = `Updated ${now}`;
      countdown = AUTO_INTERVAL;
    }

    const res = await fetch('scores.json?_=' + Date.now());
    if (!res.ok) throw new Error('scores.json not found');
    const json = await res.json();
    const allGames = json.events || [];
    if (!allGames.length) {
      document.getElementById('lastUpdated').textContent = 'No game data yet';
      return;
    }
    processGames(allGames);

  } catch(err) {
    document.getElementById('lastUpdated').textContent = 'Update failed';
  } finally {
    btn.textContent = '🔄 Live Update Scores';
    btn.disabled = false;
    btn.className = '';
  }
}

// ══════════════════════════════════════════════════════
//  ADVANCE WINNERS THROUGH BRACKET
// ══════════════════════════════════════════════════════
function advanceWinners() {
  // Within each region: winners move round by round
  Object.values(DATA.regions).forEach(region => {
    for (let ri = 0; ri < region.rounds.length - 1; ri++) {
      const cur  = region.rounds[ri];
      const next = region.rounds[ri + 1];
      cur.matchups.forEach((m, mi) => {
        if (m.status !== 'final' || !m.winner) return;
        const winner = m.winner === 1 ? { ...m.t1 } : { ...m.t2 };
        const nextSlot   = Math.floor(mi / 2);   // which matchup in next round
        const whichTeam  = mi % 2 === 0 ? 't1' : 't2'; // top or bottom slot
        const nm = next.matchups[nextSlot];
        if (!nm) return;
        nm[whichTeam] = winner;
        // Mark as scheduled once both teams are known
        if (nm.t1.name !== 'TBD' && nm.t2.name !== 'TBD' && nm.status === 'tbd') {
          nm.status = 'sched';
          nm.sched  = 'Upcoming';
        }
      });
    }
  });

  // Elite Eight winners → Final Four
  // East champion vs West champion (SF1), South vs Midwest (SF2)
  // 2026 bracket: SF1 = South vs West, SF2 = Midwest vs East
  const FF_MAP = {
    south:   { idx: 0, slot: 't1' },
    west:    { idx: 0, slot: 't2' },
    midwest: { idx: 1, slot: 't1' },
    east:    { idx: 1, slot: 't2' },
  };
  Object.entries(DATA.regions).forEach(([key, region]) => {
    const e8 = region.rounds[region.rounds.length - 1].matchups[0];
    if (e8.status !== 'final' || !e8.winner) return;
    const winner = e8.winner === 1 ? { ...e8.t1 } : { ...e8.t2 };
    const { idx, slot } = FF_MAP[key];
    DATA.finalFour[idx][slot] = winner;
    if (DATA.finalFour[idx].t1.name !== 'TBD' && DATA.finalFour[idx].t2.name !== 'TBD'
        && DATA.finalFour[idx].status === 'tbd') {
      DATA.finalFour[idx].status = 'sched';
      DATA.finalFour[idx].sched = 'Apr 4';
    }
  });

  // Final Four winners → Championship
  DATA.finalFour.forEach((m, i) => {
    if (m.status !== 'final' || !m.winner) return;
    const winner = m.winner === 1 ? { ...m.t1 } : { ...m.t2 };
    const slot = i === 0 ? 't1' : 't2';
    DATA.championship[slot] = winner;
    if (DATA.championship.t1.name !== 'TBD' && DATA.championship.t2.name !== 'TBD'
        && DATA.championship.status === 'tbd') {
      DATA.championship.status = 'sched';
      DATA.championship.sched = 'Apr 6';
    }
  });

  // Championship winner → Champion display
  if (DATA.championship.status === 'final' && DATA.championship.winner) {
    const w = DATA.championship.winner === 1 ? DATA.championship.t1 : DATA.championship.t2;
    DATA.champion = {...w};
  }
}

// ══════════════════════════════════════════════════════
//  FULL RENDER
// ══════════════════════════════════════════════════════
function renderAll() {
  advanceWinners();
  renderFullBracket();
  ['east','west','south','midwest'].forEach(renderRegion);
  renderFinalFour();
  calcScores();
}

// ══════════════════════════════════════════════════════
//  INIT + AUTO REFRESH
// ══════════════════════════════════════════════════════
const AUTO_INTERVAL = 120; // seconds between auto-refreshes
let autoTimer = null;
let countdown = AUTO_INTERVAL;

function startAutoRefresh() {
  if (autoTimer) clearInterval(autoTimer);
  countdown = AUTO_INTERVAL;
  autoTimer = setInterval(() => {
    // Don't refresh if page is hidden (tab in background / phone screen off)
    if (document.hidden) return;
    countdown--;
    document.getElementById('lastUpdated').textContent =
      `Auto-refreshing in ${countdown}s`;
    if (countdown <= 0) {
      countdown = AUTO_INTERVAL;
      updateScores();
    }
  }, 1000);
}

// Kick off on load
renderAll();
updateScores().then(() => startAutoRefresh());
</script>
